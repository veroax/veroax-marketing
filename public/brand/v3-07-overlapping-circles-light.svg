<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v3-07 Overlapping circles. Two circles in coral and teal with
       a darker overlap zone in the middle. Suggests two parties (agent
       and buyer) finding common ground, or signal-from-noise. Friendly,
       conversational, and feels modern. -->
  <circle cx="16" cy="23" r="14" fill="#E85D75" opacity="0.85"/>
  <circle cx="30" cy="23" r="14" fill="#3FB8AF" opacity="0.85"/>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="34" fill="#2D3748">Veroax</text>
</svg>
