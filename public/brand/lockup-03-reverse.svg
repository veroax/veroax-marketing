<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 296 60" role="img" aria-label="Veroax">
  <!-- 03 · Reverse fill. Gold square, navy V. The colors swap weight,
       making the mark feel warmer and more premium. The gold becomes
       the focal point; the V reads cleanly against it. -->
  <rect x="0" y="0" width="60" height="60" rx="14" fill="#C9A84C"/>
  <path d="M 16 28 L 27 43 L 48 17" stroke="#191970" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="78" y="42" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="38" fill="#191970">Veroax</text>
</svg>
