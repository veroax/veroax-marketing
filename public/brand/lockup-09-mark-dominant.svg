<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Veroax">
  <!-- 09 · Mark dominant. Larger mark, smaller wordmark. The mark
       becomes the brand's primary visual asset; the wordmark
       supports rather than carries. Better when the brand is
       built around icon recognition (think Apple, Twitter, Slack
       early-era). -->
  <rect x="0" y="0" width="80" height="80" rx="18" fill="#191970"/>
  <path d="M 22 38 L 35 55 L 62 22" stroke="#C9A84C" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="98" y="54" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="30" fill="#191970">Veroax</text>
</svg>
