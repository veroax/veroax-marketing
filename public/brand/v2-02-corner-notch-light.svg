<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v2-02 Square with corner notch. Distinctive silhouette
       (FedEx-style cleverness) — a navy rounded square with the
       upper-right corner replaced by a clean diagonal cut, gold V
       inside. The notched corner makes the silhouette uniquely
       identifiable at any size. -->
  <path d="M 12 2 L 32 2 L 44 14 L 44 34 Q 44 44 34 44 L 12 44 Q 2 44 2 34 L 2 12 Q 2 2 12 2 Z" fill="#191970"/>
  <path d="M 13 21 L 21 31 L 34 13" stroke="#D4B85C" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="34" fill="#191970">Veroax</text>
</svg>
