<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v3-01 Lowercase coral wordmark + teal dot. No graphic mark
       at all; the typography IS the brand (like Notion, Linear,
       Stripe). Coral reads warmer and friendlier than the navy
       baseline; the teal dot after the word acts as a tiny
       distinctive flourish that's hard to confuse with anything
       else. -->
  <text x="4" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="34" fill="#E85D75">veroax</text>
  <circle cx="130" cy="29" r="4" fill="#3FB8AF"/>
</svg>
