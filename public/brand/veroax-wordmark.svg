<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" role="img" aria-label="Veroax">
  <!-- Two-tone wordmark: "Vero" in navy, "ax" in brand gold.
       Reads as a single word at a glance but the color split
       gives the mark a memorable hook. Use this version on
       light backgrounds. -->
  <text x="0" y="42" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="38" fill="#191970">Vero</text>
  <text x="108" y="42" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="38" fill="#C9A84C">ax</text>
</svg>
