<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 296 60" role="img" aria-label="Veroax">
  <!-- 05 · Outlined mark. Open container with the V inside.
       Reads as lighter, more refined, more editorial. Less visual
       weight overall. Works well when the wordmark is the focal
       point and the mark is supporting. -->
  <rect x="1.5" y="1.5" width="57" height="57" rx="13" fill="none" stroke="#191970" stroke-width="3"/>
  <path d="M 16 28 L 27 43 L 48 17" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="78" y="42" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="38" fill="#191970">Veroax</text>
</svg>
