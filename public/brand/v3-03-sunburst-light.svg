<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v3-03 Marigold sunburst. Eight rays from a center dot suggest
       insight, illumination, "shining a light" on disclosures. Warm
       and optimistic. Reads at favicon scale because of the strong
       radial symmetry. -->
  <g transform="translate(23,23)">
    <circle cx="0" cy="0" r="6" fill="#F4A536"/>
    <g fill="#F4A536">
      <rect x="-2" y="-19" width="4" height="8" rx="2"/>
      <rect x="-2" y="11" width="4" height="8" rx="2"/>
      <rect x="-19" y="-2" width="8" height="4" rx="2"/>
      <rect x="11" y="-2" width="8" height="4" rx="2"/>
    </g>
    <g fill="#F4A536" transform="rotate(45)">
      <rect x="-2" y="-19" width="4" height="8" rx="2"/>
      <rect x="-2" y="11" width="4" height="8" rx="2"/>
      <rect x="-19" y="-2" width="8" height="4" rx="2"/>
      <rect x="11" y="-2" width="8" height="4" rx="2"/>
    </g>
  </g>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="34" fill="#2D3748">Veroax</text>
</svg>
