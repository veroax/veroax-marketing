<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v4 baseline reversed-out. The mark itself is unchanged (gold
       square + navy V is the brand asset, it should not invert). Only
       the wordmark flips to white so the lockup reads cleanly on dark
       backgrounds. Most professional brand systems do exactly this. -->
  <rect width="230" height="46" fill="#0F0E2E"/>
  <rect x="2" y="2" width="42" height="42" rx="10" fill="#D4B85C"/>
  <path d="M 10 10 L 22 34 L 34 10 L 29 10 L 22 26 L 15 10 Z" fill="#191970"/>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="34" fill="#FFFFFF">Veroax</text>
</svg>
