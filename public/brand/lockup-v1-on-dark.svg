<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v1 designed for dark backgrounds. Same geometry as the refined
       v1 lockup, but the color logic flips so the lockup pops on
       a near-black surface:
       - Box becomes GOLD (now the focal point against the dark)
       - V becomes NAVY (high contrast against the gold)
       - Wordmark becomes WHITE (reads clearly on dark)
       Use this version anywhere the background is dark navy or
       black: the dashboard sidebar, the PDF cover chrome, dark
       social media graphics. -->
  <rect x="2" y="2" width="42" height="42" rx="10" fill="#DDBE6A"/>
  <path d="M 13 21 L 21 31 L 34 13" stroke="#191970" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="34" fill="#FFFFFF">Veroax</text>
</svg>
