<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v2-03 Three stacked bars. Abstract document-pages mark.
       Top bar is the longest (the title), middle is medium, bottom
       is shortest — reads as a stylized document being summarized.
       Bold, simple, infinitely scalable. -->
  <rect x="2" y="2" width="42" height="42" rx="10" fill="#191970"/>
  <rect x="12" y="14" width="22" height="4" rx="2" fill="#D4B85C"/>
  <rect x="12" y="21" width="18" height="4" rx="2" fill="#D4B85C"/>
  <rect x="12" y="28" width="14" height="4" rx="2" fill="#D4B85C"/>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="34" fill="#191970">Veroax</text>
</svg>
