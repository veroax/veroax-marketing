<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 46" role="img" aria-label="Veroax">
  <!-- v3-09 Single-stroke curved V. One elegant flowing line forms a
       V with a small upward flourish at the right tip, like a quick
       confident pen mark. Plum/violet color feels intelligent and
       calming. Reads as "we make a clear judgment for you." -->
  <path d="M 6 6 Q 8 30 23 38 Q 38 30 40 6" stroke="#B084CC" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="56" y="33" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="34" fill="#2D3748">Veroax</text>
</svg>
